<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eren TOMAK - Mobil Uyumlu Analiz</title>
    <style>
        :root { 
            --bg: #001f3f; 
            --card: #2f2f2f; 
            --gold: #FFD700; 
            --white: #f4f4f4; 
        }
        
        body { 
            margin: 0; 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg); 
            color: var(--white); 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh; 
        }
        
        /* Seçim Ekranı - Esnek Yapı */
        #selection-screen { 
            display: flex; 
            flex: 1; 
            justify-content: center; 
            align-items: center; 
            gap: 20px; 
            padding: 20px; 
            flex-wrap: wrap; /* Mobilde alt alta geçmesi için */
        }
        
        .choice-card { 
            background: var(--card); 
            border: 3px solid var(--gold); 
            border-radius: 15px; 
            padding: 15px; 
            width: 100%;
            max-width: 380px; /* Masaüstünde devleşmesin */
            cursor: pointer; 
            transition: 0.3s; 
            text-align: center;
            box-sizing: border-box;
        }
        
        .choice-card:hover { transform: translateY(-5px); box-shadow: 0 0 25px var(--gold); }
        
        .choice-card img { 
            width: 100%; 
            height: auto; /* Siyah boşluğu bitiren anahtar: Yükseklik otomatik */
            max-height: 400px; 
            object-fit: cover; /* Kenarları doldurur */
            border-radius: 8px; 
            background: #000;
        }
        
        .choice-card p { 
            color: var(--gold); 
            font-weight: bold; 
            font-size: 1.2rem; 
            margin-top: 15px;
        }

        /* Analiz Ekranı */
        #analysis-screen { 
            display: none; 
            flex-direction: column; 
            align-items: center; 
            padding: 15px; 
            flex: 1; 
        }
        
        #timer { 
            font-size: 2.2rem; 
            font-weight: bold; 
            color: var(--gold); 
            margin: 10px 0; 
            border: 2px solid var(--gold); 
            padding: 5px 30px; 
            border-radius: 50px;
        }
        
        #display-area { width: 100%; max-width: 600px; text-align: center; }
        
        #display-area img { 
            width: 100%;
            height: auto; 
            max-height: 350px;
            object-fit: contain; /* Analiz sayfasında resmin tamamı görünmeli */
            margin-bottom: 15px; 
            border: 1px solid var(--gold); 
            border-radius: 10px;
        }

        .form-container { width: 100%; max-width: 600px; display: flex; flex-direction: column; gap: 12px; }
        
        input, textarea { 
            width: 100%; 
            padding: 14px; 
            border-radius: 10px; 
            border: 2px solid var(--gold); 
            background: #1a1a1a; 
            color: white; 
            font-size: 1rem;
            box-sizing: border-box; 
        }
        
        textarea { height: 120px; }
        
        #confirm-btn { 
            background: var(--gold); 
            color: #000; 
            border: none; 
            padding: 16px; 
            font-weight: bold; 
            border-radius: 10px; 
            cursor: pointer; 
            font-size: 1.1rem;
        }
        
        #confirm-btn:disabled { opacity: 0.3; }

        /* Footer - Mobilde Ölçeklendirme */
        footer { 
            text-align: center; 
            padding: 30px 15px; 
            background: rgba(0,0,0,0.7); 
            border-top: 2px solid var(--gold); 
        }
        
        .fname { 
            font-weight: bold; 
            font-size: clamp(1.8rem, 8vw, 3rem); /* Ekran küçüldükçe küçülür */
            color: var(--gold); 
            display: block; 
            text-transform: uppercase;
        }
        
        .fdept { 
            font-size: clamp(1rem, 4vw, 1.5rem); 
            margin-top: 5px; 
            display: block; 
        }

        /* Telefonlar için özel ayar */
        @media (max-width: 480px) {
            #selection-screen { padding: 10px; gap: 15px; }
            .choice-card { padding: 10px; }
            .choice-card p { font-size: 1rem; }
        }
    </style>
</head>

            <p>ŞİİRİ ANALİZ ET</p>
        </div>
    </div>

    <div id="analysis-screen">
        <div id="timer">05:00</div>
        <div id="display-area"></div>
        <div class="form-container">
            <input type="text" id="name" placeholder="Adınız ve Soyadınız">
            <textarea id="desc" placeholder="Analiz cümlenizi buraya yazınız..."></textarea>
            <button id="confirm-btn" onclick="send()">ONAYLA</button>
        </div>
    </div>

    <footer>
        <span class="fname">Eren TOMAK</span>
        <span class="fdept">Necatibey Eğitim Fakültesi - Türkçe Öğretmenliği</span>
    </footer>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyMi9wg2BzBNmn-IhoVAKO_tM9dbpXaWrR-_Mko__KyjemT671ySYjITINSc--ghOqg/exec";
        let timer, selected = "";

        function start(type, src) {
            selected = type;
            document.getElementById('selection-screen').style.display = 'none';
            document.getElementById('analysis-screen').style.display = 'flex';
            document.getElementById('display-area').innerHTML = `<img src="${src}">`;
            
            let time = 300;
            timer = setInterval(() => {
                let m = Math.floor(time / 60), s = time % 60;
                document.getElementById('timer').textContent = `${m}:${s < 10 ? '0'+s : s}`;
                if (time-- <= 0) { clearInterval(timer); lock(); }
            }, 1000);
        }

        function lock() {
            document.getElementById('name').disabled = true;
            document.getElementById('desc').disabled = true;
            document.getElementById('confirm-btn').disabled = true;
        }

        async function send() {
            const ad = document.getElementById('name').value.trim();
            const cumle = document.getElementById('desc').value.trim();
            if(!ad) return alert("Adınızı yazmalısınız!");

            clearInterval(timer);
            lock();
            document.getElementById('confirm-btn').textContent = "GÖNDERİLİYOR...";

            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ adSoyad: ad, secilenMateryal: selected, analizCumlesi: cumle })
                });
                alert("Veriler başarıyla gönderildi!");
                document.getElementById('confirm-btn').textContent = "TAMAMLANDI";
            } catch (e) {
                alert("Hata! İnterneti kontrol edin.");
            }
        }
    </script>
